{% extends "base.html" %}
{% block title %}FocusPad – Register{% endblock %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
  <h2 class="text-center">Join <strong>FocusPad</strong></h2>

  {% if error %}
    <div class="alert alert-danger mt-3">{{ error }}</div>
  {% endif %}

  <form method="POST" class="mt-4">
    <div class="mb-4">
      <label class="form-label">Username</label>
      <input name="username" class="form-control form-control-lg" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control form-control-lg" required>
    </div>
    <button type="submit" class="btn btn-success btn-lg w-100">Register</button>
  </form>

  <div class="text-center mt-4">
    <a href="/" class="btn btn-link">Back to Home</a>
  </div>
</div>
{% endblock %}
